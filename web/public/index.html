<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sabor Digital — Gestão do Restaurante</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand__mark">🍽️</span>
        <div>
          <h1>Sabor Digital</h1>
          <p>Gestão de cardápio e pedidos</p>
        </div>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab is-active" data-tab="cardapio">Cardápio</button>
        <button class="tab" data-tab="pedido">Novo pedido</button>
        <button class="tab" data-tab="pedidos">Pedidos</button>
        <button class="tab" data-tab="reservas">Reservas</button>
        <button class="tab" data-tab="painel">Painel</button>
      </nav>
    </header>

    <main class="container">
      <!-- CARDÁPIO -->
      <section class="panel is-active" id="tab-cardapio">
        <div class="panel__head">
          <h2>Cardápio</h2>
          <button class="btn btn--ghost" id="toggle-novo-prato">+ Novo prato</button>
        </div>

        <form class="card form is-hidden" id="form-prato">
          <div class="grid-2">
            <label>Nome<input name="name" required minlength="2" /></label>
            <label>Categoria<input name="category" placeholder="Ex.: Pratos Principais" /></label>
          </div>
          <label>Descrição<input name="description" /></label>
          <label>Preço (R$)<input name="price" type="number" step="0.01" min="0" required /></label>
          <div class="form__actions">
            <button class="btn btn--primary" type="submit" id="prato-submit">Salvar prato</button>
            <button class="btn btn--ghost is-hidden" type="button" id="prato-cancelar">Cancelar edição</button>
          </div>
          <p class="form__msg" id="prato-msg"></p>
        </form>

        <div class="filterbar">
          <input id="cardapio-busca" class="filterbar__search" placeholder="🔎 Buscar prato…" />
          <div class="chips" id="cardapio-categorias"></div>
        </div>

        <div id="cardapio-status"></div>
        <div class="cards" id="cardapio-lista"></div>
      </section>

      <!-- NOVO PEDIDO -->
      <section class="panel" id="tab-pedido">
        <h2>Montar pedido</h2>
        <p class="muted">Adicione itens pelo cardápio e finalize aqui.</p>

        <div class="cart card" id="carrinho">
          <div class="cart__head">
            <strong>Carrinho</strong>
            <button class="btn btn--ghost btn--small is-hidden" id="limpar-carrinho">Limpar carrinho</button>
          </div>
          <p class="muted" id="carrinho-vazio">Seu carrinho está vazio.</p>
          <ul class="cart__items" id="carrinho-itens"></ul>
        </div>

        <form class="card form" id="form-pedido">
          <div class="grid-2">
            <label>Cliente<input name="customerName" required minlength="2" /></label>
            <label>Mesa<input name="tableLabel" placeholder="Ex.: Mesa 5 / Balcão" /></label>
          </div>
          <label>Desconto
            <select name="discountCode" id="select-desconto">
              <option value="NENHUM">Sem desconto</option>
            </select>
          </label>
          <button class="btn btn--primary" type="submit">Finalizar pedido</button>
          <p class="form__msg" id="pedido-msg"></p>
        </form>
      </section>

      <!-- PEDIDOS -->
      <section class="panel" id="tab-pedidos">
        <div class="panel__head">
          <h2>Pedidos recebidos</h2>
          <div class="panel__actions">
            <select id="pedidos-filtro" class="select-inline">
              <option value="">Todos os status</option>
              <option value="RECEBIDO">Recebidos</option>
              <option value="EM_PREPARO">Em preparo</option>
              <option value="PRONTO">Prontos</option>
              <option value="ENTREGUE">Entregues</option>
              <option value="CANCELADO">Cancelados</option>
            </select>
            <button class="btn btn--ghost" id="reload-pedidos">Atualizar</button>
          </div>
        </div>
        <div id="pedidos-status"></div>
        <div class="cards" id="pedidos-lista"></div>
      </section>

      <!-- RESERVAS -->
      <section class="panel" id="tab-reservas">
        <div class="panel__head">
          <h2>Reservas de mesa</h2>
          <button class="btn btn--ghost" id="toggle-nova-reserva">+ Nova reserva</button>
        </div>

        <form class="card form is-hidden" id="form-reserva">
          <div class="grid-2">
            <label>Cliente<input name="customerName" required minlength="2" /></label>
            <label>Telefone<input name="phone" placeholder="(opcional)" /></label>
          </div>
          <div class="grid-2">
            <label>Data<input name="date" type="date" required /></label>
            <label>Horário<input name="time" type="time" required /></label>
          </div>
          <div class="grid-2">
            <label>Pessoas<input name="peopleCount" type="number" min="1" max="20" value="2" required /></label>
            <label>Área
              <select name="area" id="select-area"></select>
            </label>
          </div>
          <label>Observações<input name="notes" placeholder="Ex.: aniversário, cadeirinha de bebê" /></label>
          <button class="btn btn--primary" type="submit">Salvar reserva</button>
          <p class="form__msg" id="reserva-msg"></p>
        </form>

        <div class="panel__head">
          <div class="panel__actions">
            <select id="reservas-filtro" class="select-inline">
              <option value="">Todos os status</option>
              <option value="PENDENTE">Pendentes</option>
              <option value="CONFIRMADA">Confirmadas</option>
              <option value="CONCLUIDA">Concluídas</option>
              <option value="CANCELADA">Canceladas</option>
            </select>
            <button class="btn btn--ghost" id="reload-reservas">Atualizar</button>
          </div>
        </div>
        <div id="reservas-status"></div>
        <div class="cards" id="reservas-lista"></div>
      </section>

      <!-- PAINEL -->
      <section class="panel" id="tab-painel">
        <div class="panel__head">
          <h2>Painel do restaurante</h2>
          <button class="btn btn--ghost" id="reload-painel">Atualizar</button>
        </div>
        <div class="stats" id="painel-stats"></div>
      </section>
    </main>

    <footer class="footer">
      <span>Sabor Digital · arquitetura de microsserviços</span>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
